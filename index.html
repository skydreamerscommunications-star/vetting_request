<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetting Request | Lead Qualification Engine</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        body {
            background-color: #f8fafc;
        }
        
        input, select, textarea {
            transition: all 0.15s ease;
            font-size: 15px;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            ring: none;
        }
        
        .transition-icon {
            transition: color 0.15s ease;
        }
        
        .campaign-toggle {
            padding: 10px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.15s ease;
            cursor: pointer;
            border: 1.5px solid #e2e8f0;
            background: white;
            color: #475569;
        }
        
        .campaign-toggle.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        
        .campaign-toggle:hover:not(.active) {
            background: #f8fafc;
            border-color: #cbd5e1;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .toast-success {
            background: #10b981;
            color: white;
        }
        
        .toast-error {
            background: #ef4444;
            color: white;
        }
        
        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Tooltip container */
        .tooltip-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        
        .tooltip-text {
            visibility: hidden;
            position: absolute;
            bottom: 100%;
            left: 0;
            margin-bottom: 8px;
            background-color: #1e293b;
            color: white;
            text-align: center;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 400;
            white-space: nowrap;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        
        .tooltip-wrapper:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
        
        /* For longer tooltips that need wrapping */
        .tooltip-text-wrap {
            white-space: normal;
            max-width: 250px;
            text-align: left;
        }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Lead Information</h1>
            <p class="text-sm text-slate-500 mt-2">Pre-transfer Declaration · Qualification Engine</p>
        </div>
        
        <!-- STEP 1: Lead Information Container -->
        <div id="step1Container" class="bg-white rounded-2xl border border-slate-200 p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <!-- Phone -->
                <div>
                    <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                        Phone Number
                        <span class="tooltip-wrapper">
                            <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                            <span class="tooltip-text">Enter 10-digit phone number</span>
                        </span>
                    </label>
                    <div class="relative">
                        <div class="absolute left-3 top-3.5">
                            <i id="phoneIcon" class="fas fa-phone-alt text-slate-400 transition-icon"></i>
                        </div>
                        <input type="tel" id="phone" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Phone Number *">
                    </div>
                </div>
                
                <!-- First Name -->
                <div>
                    <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                        First Name
                        <span class="tooltip-wrapper">
                            <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                            <span class="tooltip-text">Lead's first name</span>
                        </span>
                    </label>
                    <div class="relative">
                        <div class="absolute left-3 top-3.5">
                            <i id="firstNameIcon" class="fas fa-user text-slate-400 transition-icon"></i>
                        </div>
                        <input type="text" id="firstName" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="First Name *">
                    </div>
                </div>
                
                <!-- Last Name -->
                <div>
                    <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                        Last Name
                        <span class="tooltip-wrapper">
                            <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                            <span class="tooltip-text">Lead's last name</span>
                        </span>
                    </label>
                    <div class="relative">
                        <div class="absolute left-3 top-3.5">
                            <i id="lastNameIcon" class="fas fa-user text-slate-400 transition-icon"></i>
                        </div>
                        <input type="text" id="lastName" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Last Name *">
                    </div>
                </div>
                
                <!-- State -->
                <div>
                    <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                        State
                        <span class="tooltip-wrapper">
                            <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                            <span class="tooltip-text">2-letter state code</span>
                        </span>
                    </label>
                    <div class="relative">
                        <div class="absolute left-3 top-3.5">
                            <i id="stateIcon" class="fas fa-map-marker-alt text-slate-400 transition-icon"></i>
                        </div>
                        <select id="state" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white appearance-none">
                            <option value="">Select State *</option>
                        </select>
                        <div class="absolute right-3 top-3.5 pointer-events-none">
                            <i class="fas fa-chevron-down text-slate-400 text-sm"></i>
                        </div>
                    </div>
                </div>
                
                <!-- ZIP -->
                <div>
                    <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                        ZIP Code
                        <span class="tooltip-wrapper">
                            <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                            <span class="tooltip-text">5-digit postal code</span>
                        </span>
                    </label>
                    <div class="relative">
                        <div class="absolute left-3 top-3.5">
                            <i id="zipIcon" class="fas fa-mail-bulk text-slate-400 transition-icon"></i>
                        </div>
                        <input type="text" id="zip" maxlength="5" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="ZIP Code *">
                    </div>
                </div>
                
                <!-- TrustedForm URL -->
                <div class="md:col-span-2">
                    <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                        TrustedForm URL
                        <span class="tooltip-wrapper">
                            <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                            <span class="tooltip-text">Must contain "cert.trustedform.com"</span>
                        </span>
                    </label>
                    <div class="relative">
                        <div class="absolute left-3 top-3.5">
                            <i id="trustedFormIcon" class="fas fa-link text-slate-400 transition-icon"></i>
                        </div>
                        <input type="text" id="trustedFormUrl" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="TrustedForm URL *">
                    </div>
                    <p class="text-xs text-slate-400 mt-1 ml-2">Must contain "cert.trustedform.com"</p>
                </div>
            </div>
            
            <div class="mt-6">
                <button id="continueBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-all">
                    Continue →
                </button>
            </div>
        </div>
        
        <!-- STEP 2: Qualification Engine Container (hidden initially) -->
        <div id="step2Container" class="bg-white rounded-2xl border border-slate-200 p-6 hidden">
            <!-- Lead Summary -->
            <div class="bg-slate-50 rounded-xl p-4 mb-6 border border-slate-200">
                <div class="flex items-center gap-2 text-slate-600">
                    <i class="fas fa-user-check text-blue-500"></i>
                    <span id="summaryText" class="font-medium">Loading...</span>
                </div>
            </div>
            
            <!-- Campaign Buttons -->
            <div class="flex justify-center gap-4 mb-8">
                <button id="autoCampaignBtn" class="campaign-toggle active flex items-center gap-2">
                    <i class="fas fa-car"></i> Auto
                </button>
                <button id="mvaCampaignBtn" class="campaign-toggle flex items-center gap-2">
                    <i class="fas fa-gavel"></i> MVA
                </button>
            </div>
            
            <!-- Auto Form -->
            <div id="autoForm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Make
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text">Vehicle manufacturer</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="autoMakeIcon" class="fas fa-car text-slate-400 transition-icon"></i>
                            </div>
                            <select id="autoMake" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 bg-white">
                                <option value="">Select Make *</option>
                                <option>Toyota</option><option>Honda</option><option>Ford</option><option>Chevrolet</option>
                                <option>Nissan</option><option>Hyundai</option><option>Kia</option><option>Subaru</option>
                                <option>BMW</option><option>Mercedes-Benz</option><option>Volkswagen</option><option>Other</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Model
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text">Vehicle model name</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="autoModelIcon" class="fas fa-car-side text-slate-400 transition-icon"></i>
                            </div>
                            <input type="text" id="autoModel" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500" placeholder="Model *">
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Year
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text">Vehicle model year</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="autoYearIcon" class="fas fa-calendar text-slate-400 transition-icon"></i>
                            </div>
                            <select id="autoYear" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 bg-white">
                                <option value="">Select Year *</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Current Provider
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text">Current insurance carrier</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="autoProviderIcon" class="fas fa-building text-slate-400 transition-icon"></i>
                            </div>
                            <select id="autoProvider" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 bg-white">
                                <option value="">Select Provider *</option>
                                <option>State Farm</option><option>Geico</option><option>Progressive</option>
                                <option>Allstate</option><option>USAA</option><option>Liberty Mutual</option>
                                <option>Farmers</option><option>Nationwide</option><option>Other</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            License Status
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text">Current driver's license status</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="autoLicenseIcon" class="fas fa-id-card text-slate-400 transition-icon"></i>
                            </div>
                            <select id="autoLicense" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 bg-white">
                                <option value="">Select License Status *</option>
                                <option>Valid</option><option>Suspended</option><option>None</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Violations
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text">Recent driving violations record</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="autoViolationsIcon" class="fas fa-exclamation-triangle text-slate-400 transition-icon"></i>
                            </div>
                            <select id="autoViolations" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 bg-white">
                                <option value="">Select Violations *</option>
                                <option>Clean</option><option>Minor</option><option>Major</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- MVA Form (hidden initially) -->
            <div id="mvaForm" class="hidden">
                <!-- SECTION 1: Accident Details -->
                <div class="section-header">
                    <i class="fas fa-car-crash text-blue-500 text-lg"></i>
                    <span class="font-semibold text-slate-700">Accident Details</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Date of Accident
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text">When did the accident occur?</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="accidentDateIcon" class="fas fa-calendar-alt text-slate-400 transition-icon"></i>
                            </div>
                            <input type="date" id="accidentDate" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500">
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            State of Accident
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text">Where did the accident happen?</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="accidentStateIcon" class="fas fa-map-marker-alt text-slate-400 transition-icon"></i>
                            </div>
                            <select id="accidentState" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 bg-white">
                                <option value="">Select State *</option>
                            </select>
                        </div>
                    </div>
                    <div class="md:col-span-2">
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Scenario
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text tooltip-text-wrap">Brief description of how the accident occurred</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="scenarioIcon" class="fas fa-file-alt text-slate-400 transition-icon"></i>
                            </div>
                            <input type="text" id="scenario" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500" placeholder="Scenario Description *">
                        </div>
                    </div>
                </div>
                
                <!-- SECTION 2: Liability Assessment -->
                <div class="section-header">
                    <i class="fas fa-gavel text-blue-500 text-lg"></i>
                    <span class="font-semibold text-slate-700">Liability Assessment</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Source of Fault
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text tooltip-text-wrap">What is the source of fault determination?</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="sourceOfFaultIcon" class="fas fa-database text-slate-400 transition-icon"></i>
                            </div>
                            <select id="sourceOfFault" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 bg-white">
                                <option value="">Select Source of Fault *</option>
                                <option>Police report available</option>
                                <option>Insurance determination</option>
                                <option>Customer statement only</option>
                                <option>No information available</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Liability Assessment
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text tooltip-text-wrap">Based on available information, who is at fault?</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="liabilityIcon" class="fas fa-balance-scale text-slate-400 transition-icon"></i>
                            </div>
                            <select id="liabilityAssessment" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 bg-white">
                                <option value="">Select Liability Assessment *</option>
                                <option>Other party at fault</option>
                                <option>Shared fault</option>
                                <option>Client at fault</option>
                                <option>Unknown</option>
                            </select>
                        </div>
                    </div>
                    <div class="md:col-span-2">
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Accident Situation
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text tooltip-text-wrap">What happened after the accident?</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="situationIcon" class="fas fa-car-crash text-slate-400 transition-icon"></i>
                            </div>
                            <select id="accidentSituation" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 bg-white">
                                <option value="">Select Accident Situation *</option>
                                <option>Information exchanged</option>
                                <option>No information exchanged</option>
                                <option>Hit and run</option>
                                <option>Customer unconscious</option>
                                <option>Police not present</option>
                                <option>Unsure</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- SECTION 3: Injury & Impact -->
                <div class="section-header">
                    <i class="fas fa-notes-medical text-blue-500 text-lg"></i>
                    <span class="font-semibold text-slate-700">Injury & Impact</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Nature of Injuries
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text tooltip-text-wrap">Describe all injuries sustained (whiplash, back pain, broken bones, etc.)</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="injuryIcon" class="fas fa-notes-medical text-slate-400 transition-icon"></i>
                            </div>
                            <textarea id="injuryNotes" rows="3" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500" placeholder="Nature of Injuries"></textarea>
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Type of Treatment
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text tooltip-text-wrap">What treatment has been received? (ER, physical therapy, chiropractor, etc.)</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="treatmentIcon" class="fas fa-hospital-user text-slate-400 transition-icon"></i>
                            </div>
                            <textarea id="treatmentNotes" rows="3" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500" placeholder="Type of Treatment"></textarea>
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Impact on Daily Life
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text tooltip-text-wrap">Are injuries affecting daily life or ability to work?</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="impactIcon" class="fas fa-chart-line text-slate-400 transition-icon"></i>
                            </div>
                            <select id="impactLife" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 bg-white">
                                <option value="">Select Impact on Daily Life *</option>
                                <option>Yes, unable to work</option>
                                <option>Yes, limited work / activities</option>
                                <option>No significant impact</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- SECTION 4: Claim Status -->
                <div class="section-header">
                    <i class="fas fa-file-signature text-blue-500 text-lg"></i>
                    <span class="font-semibold text-slate-700">Claim Status</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Attorney Status
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text tooltip-text-wrap">Has the customer hired an attorney?</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="attorneyIcon" class="fas fa-gavel text-slate-400 transition-icon"></i>
                            </div>
                            <select id="attorneyStatus" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 bg-white">
                                <option value="">Select Attorney Status *</option>
                                <option>No, I do not have an attorney</option>
                                <option>Yes, I have signed paperwork with an attorney</option>
                                <option>Yes, I have spoken to an attorney but did not sign</option>
                                <option>I am in the process of hiring an attorney</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Settlement Status
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text tooltip-text-wrap">Has any settlement been paid?</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="settlementIcon" class="fas fa-hand-holding-usd text-slate-400 transition-icon"></i>
                            </div>
                            <select id="settlementStatus" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 bg-white">
                                <option value="">Select Settlement Status *</option>
                                <option>No, I haven't received any payment</option>
                                <option>Yes, for vehicle/property damage only</option>
                                <option>Yes, for medical bills or injury compensation</option>
                                <option>Yes, but only partial payments</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                            Release Signed
                            <span class="tooltip-wrapper">
                                <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                                <span class="tooltip-text tooltip-text-wrap">Did the customer sign a release of liability?</span>
                            </span>
                        </label>
                        <div class="relative">
                            <div class="absolute left-3 top-3.5">
                                <i id="releaseIcon" class="fas fa-file-signature text-slate-400 transition-icon"></i>
                            </div>
                            <select id="releaseSigned" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 bg-white">
                                <option value="">Select Release Status *</option>
                                <option>No</option>
                                <option>Yes</option>
                                <option>Not sure</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="border-t border-slate-200 my-6"></div>
            
            <!-- Final Section -->
            <div class="space-y-5">
                <div class="flex items-start gap-3">
                    <input type="checkbox" id="consentCheck" class="w-4 h-4 mt-1 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                    <label id="consentLabel" class="text-sm text-slate-600 font-normal">I confirm that the lead has provided consent for transfer and all information is accurate to the best of my knowledge.</label>
                </div>
                <div>
                    <label class="flex items-center gap-2 text-xs font-medium text-slate-600 mb-1">
                        Agent Name
                        <span class="tooltip-wrapper">
                            <i class="fas fa-info-circle text-slate-400 hover:text-blue-500 text-xs"></i>
                            <span class="tooltip-text">Select your agent ID</span>
                        </span>
                    </label>
                    <div class="relative">
                        <div class="absolute left-3 top-3.5">
                            <i id="agentIcon" class="fas fa-user-tie text-slate-400 transition-icon"></i>
                        </div>
                        <select id="agentSelect" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 bg-white">
                            <option value="">Select Agent *</option>
                        </select>
                    </div>
                </div>
                <button id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-all">
                    Submit Vetting Request
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // ==================== CONFIGURATION ====================
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzdh1DLqbyhHAZNjV5O_0VwW5njnZgQ7P6jczsqSVjjXrHmkjLC3bqsFKS5fmwsA58/exec";
        
        // US States
        const STATES = ['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY'];
        
        // State
        let currentCampaign = 'Auto';
        let isSubmitting = false;
        let agentsList = [];
        
        // Populate year dropdown
        const yearSelect = document.getElementById('autoYear');
        const currentYear = new Date().getFullYear();
        for (let year = currentYear; year >= currentYear - 40; year--) {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year;
            yearSelect.appendChild(option);
        }
        
        // Populate state dropdowns
        function populateStates() {
            const stateSelect = document.getElementById('state');
            const accidentStateSelect = document.getElementById('accidentState');
            
            STATES.forEach(state => {
                const opt1 = document.createElement('option');
                opt1.value = state;
                opt1.textContent = state;
                stateSelect.appendChild(opt1);
                
                const opt2 = document.createElement('option');
                opt2.value = state;
                opt2.textContent = state;
                accidentStateSelect.appendChild(opt2);
            });
        }
        
        // Icon color update helper
        function updateIconColor(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input && icon) {
                const value = input.value?.trim();
                if (value && value !== '' && value !== 'Select option *') {
                    icon.classList.remove('text-slate-400');
                    icon.classList.add('text-blue-500');
                } else {
                    icon.classList.remove('text-blue-500');
                    icon.classList.add('text-slate-400');
                }
            }
        }
        
        // Setup icon watchers for all fields
        function setupIconWatchers() {
            const fields = [
                { input: 'phone', icon: 'phoneIcon' },
                { input: 'firstName', icon: 'firstNameIcon' },
                { input: 'lastName', icon: 'lastNameIcon' },
                { input: 'state', icon: 'stateIcon' },
                { input: 'zip', icon: 'zipIcon' },
                { input: 'trustedFormUrl', icon: 'trustedFormIcon' },
                { input: 'autoMake', icon: 'autoMakeIcon' },
                { input: 'autoModel', icon: 'autoModelIcon' },
                { input: 'autoYear', icon: 'autoYearIcon' },
                { input: 'autoProvider', icon: 'autoProviderIcon' },
                { input: 'autoLicense', icon: 'autoLicenseIcon' },
                { input: 'autoViolations', icon: 'autoViolationsIcon' },
                { input: 'accidentDate', icon: 'accidentDateIcon' },
                { input: 'accidentState', icon: 'accidentStateIcon' },
                { input: 'scenario', icon: 'scenarioIcon' },
                { input: 'sourceOfFault', icon: 'sourceOfFaultIcon' },
                { input: 'liabilityAssessment', icon: 'liabilityIcon' },
                { input: 'accidentSituation', icon: 'situationIcon' },
                { input: 'injuryNotes', icon: 'injuryIcon' },
                { input: 'treatmentNotes', icon: 'treatmentIcon' },
                { input: 'impactLife', icon: 'impactIcon' },
                { input: 'attorneyStatus', icon: 'attorneyIcon' },
                { input: 'settlementStatus', icon: 'settlementIcon' },
                { input: 'releaseSigned', icon: 'releaseIcon' },
                { input: 'agentSelect', icon: 'agentIcon' }
            ];
            
            fields.forEach(field => {
                const element = document.getElementById(field.input);
                if (element) {
                    element.addEventListener('input', () => updateIconColor(field.input, field.icon));
                    element.addEventListener('change', () => updateIconColor(field.input, field.icon));
                    updateIconColor(field.input, field.icon);
                }
            });
        }
        
        // Validate Step 1
        function validateStep1() {
            const phone = document.getElementById('phone').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const state = document.getElementById('state').value;
            const zip = document.getElementById('zip').value.trim();
            const tfUrl = document.getElementById('trustedFormUrl').value.trim();
            
            if (!phone) return 'Phone number is required';
            if (!firstName) return 'First name is required';
            if (!lastName) return 'Last name is required';
            if (!state) return 'State is required';
            if (!/^\d{5}$/.test(zip)) return 'ZIP code must be 5 digits';
            if (!tfUrl) return 'TrustedForm URL is required';
            if (!tfUrl.includes('cert.trustedform.com')) return 'TrustedForm URL must contain "cert.trustedform.com"';
            
            return null;
        }
        
        // Load Agents from Backend
        async function loadAgents() {
            try {
                const response = await fetch(`${WEB_APP_URL}?action=agents`);
                const data = await response.json();
                
                if (data.success && data.agents && data.agents.length) {
                    agentsList = data.agents;
                    const agentSelect = document.getElementById('agentSelect');
                    agentSelect.innerHTML = '<option value="">Select Agent *</option>';
                    agentsList.forEach(agent => {
                        const option = document.createElement('option');
                        option.value = agent.id;
                        option.textContent = agent.name;
                        agentSelect.appendChild(option);
                    });
                } else {
                    throw new Error('No agents loaded from backend');
                }
            } catch (error) {
                console.error('Error loading agents:', error);
                const agentSelect = document.getElementById('agentSelect');
                agentSelect.innerHTML = '<option value="">Error loading agents. Please refresh.</option>';
                showToast('Failed to load agents. Please refresh the page.', false);
            }
        }
        
        // Show Toast
        function showToast(message, isSuccess) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${isSuccess ? 'toast-success' : 'toast-error'}`;
            toast.innerHTML = `<i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
        
        // Switch Campaign
        function switchToAuto() {
            currentCampaign = 'Auto';
            document.getElementById('autoForm').classList.remove('hidden');
            document.getElementById('mvaForm').classList.add('hidden');
            document.getElementById('autoCampaignBtn').classList.add('active');
            document.getElementById('mvaCampaignBtn').classList.remove('active');
            document.getElementById('consentLabel').innerHTML = 'I confirm that the lead has provided consent for Auto insurance transfer and all information is accurate.';
        }
        
        function switchToMva() {
            currentCampaign = 'MVA';
            document.getElementById('mvaForm').classList.remove('hidden');
            document.getElementById('autoForm').classList.add('hidden');
            document.getElementById('mvaCampaignBtn').classList.add('active');
            document.getElementById('autoCampaignBtn').classList.remove('active');
            document.getElementById('consentLabel').innerHTML = 'I confirm that the lead has provided consent for MVA claim transfer and all accident details are accurate.';
        }
        
        // Validate Campaign Forms
        function validateAutoForm() {
            const make = document.getElementById('autoMake').value;
            const model = document.getElementById('autoModel').value.trim();
            const year = document.getElementById('autoYear').value;
            const provider = document.getElementById('autoProvider').value;
            const license = document.getElementById('autoLicense').value;
            const violations = document.getElementById('autoViolations').value;
            return make && model && year && provider && license && violations;
        }
        
        function validateMvaForm() {
            const accidentDate = document.getElementById('accidentDate').value;
            const accidentState = document.getElementById('accidentState').value;
            const scenario = document.getElementById('scenario').value.trim();
            const sourceOfFault = document.getElementById('sourceOfFault').value;
            const liabilityAssessment = document.getElementById('liabilityAssessment').value;
            const accidentSituation = document.getElementById('accidentSituation').value;
            const impactLife = document.getElementById('impactLife').value;
            return accidentDate && accidentState && scenario && sourceOfFault && liabilityAssessment && accidentSituation && impactLife;
        }
        
        // Gather Data
        function gatherLeadData() {
            return {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                state: document.getElementById('state').value,
                zip: document.getElementById('zip').value.trim(),
                trustedFormUrl: document.getElementById('trustedFormUrl').value.trim()
            };
        }
        
        function gatherAutoData() {
            return {
                make: document.getElementById('autoMake').value,
                model: document.getElementById('autoModel').value.trim(),
                year: document.getElementById('autoYear').value,
                provider: document.getElementById('autoProvider').value,
                licenseStatus: document.getElementById('autoLicense').value,
                violations: document.getElementById('autoViolations').value
            };
        }
        
        function gatherMvaData() {
            return {
                accidentDate: document.getElementById('accidentDate').value,
                accidentState: document.getElementById('accidentState').value,
                scenario: document.getElementById('scenario').value.trim(),
                sourceOfFault: document.getElementById('sourceOfFault').value,
                liabilityAssessment: document.getElementById('liabilityAssessment').value,
                accidentSituation: document.getElementById('accidentSituation').value,
                injuryNotes: document.getElementById('injuryNotes').value,
                treatmentNotes: document.getElementById('treatmentNotes').value,
                impactLife: document.getElementById('impactLife').value,
                attorneyStatus: document.getElementById('attorneyStatus').value,
                settlementStatus: document.getElementById('settlementStatus').value,
                releaseSigned: document.getElementById('releaseSigned').value
            };
        }
        
        // Submit
        async function submitForm() {
            if (isSubmitting) return;
            
            const leadData = gatherLeadData();
            const agentId = document.getElementById('agentSelect').value;
            const agentName = document.getElementById('agentSelect').options[document.getElementById('agentSelect').selectedIndex]?.text;
            
            if (!agentId || !agentName) {
                showToast('Please select an agent', false);
                return;
            }
            
            if (currentCampaign === 'Auto' && !validateAutoForm()) {
                showToast('Please complete all vehicle and insurance fields', false);
                return;
            }
            
            if (currentCampaign === 'MVA' && !validateMvaForm()) {
                showToast('Please complete all accident and liability fields', false);
                return;
            }
            
            const consent = document.getElementById('consentCheck').checked;
            if (!consent) {
                showToast('Please confirm consent to proceed', false);
                return;
            }
            
            isSubmitting = true;
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span> Submitting...';
            
            const payload = {
                campaign: currentCampaign,
                ...leadData,
                agentId: agentId,
                agentName: agentName,
                qualification: currentCampaign === 'Auto' ? gatherAutoData() : gatherMvaData()
            };
            
            console.log("Submitting payload:", payload);
            
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const text = await response.text();
                console.log("Response:", text);
                
                let result;
                try {
                    result = JSON.parse(text);
                } catch (err) {
                    console.error("Invalid response:", text);
                    throw new Error("Server returned invalid response");
                }
                
                if (result.success) {
                    showToast(`✓ Vetting request submitted! ID: ${result.submissionId}`, true);
                    
                    // Reset all fields
                    document.getElementById('phone').value = '';
                    document.getElementById('firstName').value = '';
                    document.getElementById('lastName').value = '';
                    document.getElementById('state').value = '';
                    document.getElementById('zip').value = '';
                    document.getElementById('trustedFormUrl').value = '';
                    document.getElementById('consentCheck').checked = false;
                    
                    // Reset auto form
                    document.getElementById('autoMake').value = '';
                    document.getElementById('autoModel').value = '';
                    document.getElementById('autoYear').value = '';
                    document.getElementById('autoProvider').value = '';
                    document.getElementById('autoLicense').value = '';
                    document.getElementById('autoViolations').value = '';
                    
                    // Reset MVA form
                    document.getElementById('accidentDate').value = '';
                    document.getElementById('accidentState').value = '';
                    document.getElementById('scenario').value = '';
                    document.getElementById('sourceOfFault').value = '';
                    document.getElementById('liabilityAssessment').value = '';
                    document.getElementById('accidentSituation').value = '';
                    document.getElementById('injuryNotes').value = '';
                    document.getElementById('treatmentNotes').value = '';
                    document.getElementById('impactLife').value = '';
                    document.getElementById('attorneyStatus').value = '';
                    document.getElementById('settlementStatus').value = '';
                    document.getElementById('releaseSigned').value = '';
                    
                    // Reset icons
                    setupIconWatchers();
                    
                    // Go back to step 1
                    document.getElementById('step1Container').classList.remove('hidden');
                    document.getElementById('step2Container').classList.add('hidden');
                } else {
                    showToast(`✗ Submission failed: ${result.message}`, false);
                }
            } catch (error) {
                console.error('Submission error:', error);
                showToast('Network error. Please check your connection and try again.', false);
            } finally {
                isSubmitting = false;
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Submit Vetting Request';
            }
        }
        
        // Continue to Step 2
        function continueToStep2() {
            const error = validateStep1();
            if (error) {
                showToast(error, false);
                return;
            }
            
            const leadData = gatherLeadData();
            document.getElementById('summaryText').innerHTML = `${leadData.firstName} ${leadData.lastName} · ${leadData.phone}`;
            
            document.getElementById('step1Container').classList.add('hidden');
            document.getElementById('step2Container').classList.remove('hidden');
        }
        
        // Event Listeners
        document.getElementById('continueBtn').addEventListener('click', continueToStep2);
        document.getElementById('autoCampaignBtn').addEventListener('click', switchToAuto);
        document.getElementById('mvaCampaignBtn').addEventListener('click', switchToMva);
        document.getElementById('submitBtn').addEventListener('click', submitForm);
        
        // Input formatting
        document.getElementById('phone').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
        });
        
        document.getElementById('zip').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 5);
        });
        
        // Initialize
        populateStates();
        loadAgents();
        setupIconWatchers();
        switchToAuto();
    </script>
</body>
</html>
