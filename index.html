<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetting Request | Pre-Transfer Declaration</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Flat, clean styling - no shadows, no gradients */
        * {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* Input sizing - balanced, not bulky */
        input, select, textarea {
            font-size: 15px !important;
            padding: 12px 14px !important;
            border-radius: 6px !important;
            border: 1px solid #d1d5db !important;
            background-color: white !important;
            width: 100%;
            line-height: 1.5;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none !important;
            border-color: #3b82f6 !important;
            box-shadow: none !important;
        }
        
        /* Labels - clear and readable */
        label {
            font-size: 13px !important;
            font-weight: 500 !important;
            color: #374151 !important;
            margin-bottom: 6px !important;
            display: block;
        }
        
        /* Buttons - flat, functional */
        button {
            cursor: pointer;
            font-weight: 500;
            transition: none;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Campaign toggle buttons */
        .campaign-btn {
            padding: 10px 24px !important;
            font-size: 15px !important;
            font-weight: 500 !important;
            border-radius: 6px !important;
            border: 1px solid #d1d5db !important;
            background-color: white !important;
            color: #374151 !important;
        }
        
        .campaign-active {
            background-color: #3b82f6 !important;
            color: white !important;
            border-color: #3b82f6 !important;
        }
        
        /* Continue and Submit buttons */
        .primary-btn {
            background-color: #3b82f6 !important;
            color: white !important;
            padding: 12px 24px !important;
            font-size: 15px !important;
            font-weight: 500 !important;
            border-radius: 6px !important;
            border: none !important;
            width: 100%;
        }
        
        .primary-btn:hover:not(:disabled) {
            background-color: #2563eb !important;
        }
        
        /* Simple toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
        }
        
        .toast-success {
            background-color: #10b981;
            color: white;
        }
        
        .toast-error {
            background-color: #ef4444;
            color: white;
        }
        
        /* Simple loader */
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Textarea specific */
        textarea {
            resize: vertical;
            min-height: 84px;
        }
        
        /* Consistent spacing */
        .space-y-5 > * + * {
            margin-top: 20px;
        }
        
        .gap-5 {
            gap: 20px;
        }
        
        /* Simple divider */
        .divider {
            border-top: 1px solid #e5e7eb;
            margin: 24px 0;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header - always visible -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Lead Information</h1>
            <p class="text-sm text-gray-500 mt-1">Pre-transfer Declaration · QA Layer</p>
        </div>
        
        <!-- STEP 1: Lead Information Container -->
        <div id="step1Container" class="bg-white border border-gray-200 rounded-lg p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label><i class="fas fa-phone-alt mr-2 text-gray-400 text-xs"></i> Phone *</label>
                    <input type="tel" id="phone" placeholder="5551234567">
                </div>
                <div>
                    <label><i class="fas fa-user mr-2 text-gray-400 text-xs"></i> First Name *</label>
                    <input type="text" id="firstName" placeholder="John">
                </div>
                <div>
                    <label><i class="fas fa-user mr-2 text-gray-400 text-xs"></i> Last Name *</label>
                    <input type="text" id="lastName" placeholder="Doe">
                </div>
                <div>
                    <label><i class="fas fa-map-marker-alt mr-2 text-gray-400 text-xs"></i> State *</label>
                    <select id="state">
                        <option value="">Select State</option>
                    </select>
                </div>
                <div>
                    <label><i class="fas fa-mail-bulk mr-2 text-gray-400 text-xs"></i> ZIP Code *</label>
                    <input type="text" id="zip" maxlength="5" placeholder="12345">
                </div>
                <div class="md:col-span-2">
                    <label><i class="fas fa-link mr-2 text-gray-400 text-xs"></i> TrustedForm URL *</label>
                    <input type="text" id="trustedFormUrl" placeholder="https://cert.trustedform.com/...">
                    <p class="text-xs text-gray-400 mt-1">Must contain "cert.trustedform.com"</p>
                </div>
            </div>
            
            <div class="mt-6">
                <button id="continueBtn" class="primary-btn">
                    Continue →
                </button>
            </div>
        </div>
        
        <!-- STEP 2: Vetting Form Container (hidden initially) -->
        <div id="step2Container" class="bg-white border border-gray-200 rounded-lg p-6 hidden">
            <!-- Campaign Buttons -->
            <div class="flex justify-center gap-4 mb-6">
                <button id="autoCampaignBtn" class="campaign-btn campaign-active flex items-center gap-2">
                    <i class="fas fa-car"></i> Auto
                </button>
                <button id="mvaCampaignBtn" class="campaign-btn flex items-center gap-2">
                    <i class="fas fa-gavel"></i> MVA
                </button>
            </div>
            
            <!-- Auto Form -->
            <div id="autoForm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label><i class="fas fa-car mr-2 text-gray-400 text-xs"></i> Make *</label>
                        <select id="autoMake">
                            <option value="">Select Make</option>
                            <option>Toyota</option><option>Honda</option><option>Ford</option><option>Chevrolet</option>
                            <option>Nissan</option><option>Hyundai</option><option>Kia</option><option>Subaru</option>
                            <option>BMW</option><option>Mercedes-Benz</option><option>Volkswagen</option><option>Other</option>
                        </select>
                    </div>
                    <div>
                        <label><i class="fas fa-car-side mr-2 text-gray-400 text-xs"></i> Model *</label>
                        <input type="text" id="autoModel" placeholder="e.g., Camry">
                    </div>
                    <div>
                        <label><i class="fas fa-calendar mr-2 text-gray-400 text-xs"></i> Year *</label>
                        <select id="autoYear">
                            <option value="">Select Year</option>
                        </select>
                    </div>
                    <div>
                        <label><i class="fas fa-building mr-2 text-gray-400 text-xs"></i> Current Provider *</label>
                        <select id="autoProvider">
                            <option value="">Select Provider</option>
                            <option>State Farm</option><option>Geico</option><option>Progressive</option>
                            <option>Allstate</option><option>USAA</option><option>Liberty Mutual</option>
                            <option>Farmers</option><option>Nationwide</option><option>Other</option>
                        </select>
                    </div>
                    <div>
                        <label><i class="fas fa-id-card mr-2 text-gray-400 text-xs"></i> License Status *</label>
                        <select id="autoLicense">
                            <option>Valid</option><option>Suspended</option><option>None</option>
                        </select>
                    </div>
                    <div>
                        <label><i class="fas fa-exclamation-triangle mr-2 text-gray-400 text-xs"></i> Violations *</label>
                        <select id="autoViolations">
                            <option>Clean</option><option>Minor</option><option>Major</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- MVA Form (hidden initially) -->
            <div id="mvaForm" class="hidden">
                <!-- Accident Details -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
                    <div>
                        <label><i class="fas fa-calendar-alt mr-2 text-gray-400 text-xs"></i> Date of Accident *</label>
                        <input type="date" id="accidentDate">
                    </div>
                    <div>
                        <label><i class="fas fa-map-marker-alt mr-2 text-gray-400 text-xs"></i> State of Accident *</label>
                        <select id="accidentState">
                            <option value="">Select State</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label><i class="fas fa-file-alt mr-2 text-gray-400 text-xs"></i> Scenario *</label>
                        <input type="text" id="scenario" placeholder="e.g., Rear-end collision at intersection">
                    </div>
                </div>
                
                <!-- Two Column Layout - Perfect Alignment -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
                    <!-- Left Column -->
                    <div class="space-y-5">
                        <div>
                            <label><i class="fas fa-file-police mr-2 text-gray-400 text-xs"></i> Police Report *</label>
                            <select id="policeReport">
                                <option>Yes, and I have the report</option>
                                <option>Yes, but I don't have a copy</option>
                                <option>Police were called but didn't arrive</option>
                                <option>Police were not called</option>
                                <option>Unsure / don't remember</option>
                            </select>
                        </div>
                        <div>
                            <label><i class="fas fa-gavel mr-2 text-gray-400 text-xs"></i> Was other party declared at fault? *</label>
                            <select id="faultDeclared">
                                <option>Yes, Police declared other at fault</option>
                                <option>Yes, Insurance declared other at fault</option>
                                <option>No, declared me at fault</option>
                                <option>Both parties contributed</option>
                                <option>Undetermined / Pending</option>
                            </select>
                        </div>
                        <div>
                            <label><i class="fas fa-users mr-2 text-gray-400 text-xs"></i> Who was at fault? *</label>
                            <select id="atFaultParty">
                                <option>The other driver was completely at fault</option>
                                <option>Client was at fault</option>
                                <option>Both drivers were partially at fault</option>
                                <option>Unsure / don't know</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Right Column - Textareas match height visually -->
                    <div class="space-y-5">
                        <div>
                            <label><i class="fas fa-notes-medical mr-2 text-gray-400 text-xs"></i> Nature of Injuries</label>
                            <textarea id="injuryNotes" rows="3" placeholder="Describe injuries (whiplash, back pain, cuts, bruises, etc.)"></textarea>
                        </div>
                        <div>
                            <label><i class="fas fa-hospital-user mr-2 text-gray-400 text-xs"></i> Type of Treatment</label>
                            <textarea id="treatmentNotes" rows="3" placeholder="Describe treatment received (ER, physical therapy, chiropractor, etc.)"></textarea>
                        </div>
                        <div>
                            <label><i class="fas fa-chart-line mr-2 text-gray-400 text-xs"></i> Impact on Daily Life *</label>
                            <select id="impactLife">
                                <option>Yes, unable to work</option>
                                <option>Yes, limited work / activities</option>
                                <option>No significant impact</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- Representation - 3 equal columns -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                    <div>
                        <label><i class="fas fa-gavel mr-2 text-gray-400 text-xs"></i> Attorney Status</label>
                        <select id="attorneyStatus">
                            <option>No, I do not have an attorney</option>
                            <option>Yes, I have signed paperwork with an attorney</option>
                            <option>Yes, I have spoken to an attorney but did not sign</option>
                            <option>I am in the process of hiring an attorney</option>
                        </select>
                    </div>
                    <div>
                        <label><i class="fas fa-hand-holding-usd mr-2 text-gray-400 text-xs"></i> Settlement Status</label>
                        <select id="settlementStatus">
                            <option>No, I haven't received any payment</option>
                            <option>Yes, for vehicle/property damage only</option>
                            <option>Yes, for medical bills or injury compensation</option>
                            <option>Yes, but only partial payments</option>
                        </select>
                    </div>
                    <div>
                        <label><i class="fas fa-file-signature mr-2 text-gray-400 text-xs"></i> Release Signed</label>
                        <select id="releaseSigned">
                            <option>No</option>
                            <option>Yes</option>
                            <option>Not sure</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="divider"></div>
            
            <!-- Final Section -->
            <div class="space-y-5">
                <div class="flex items-start gap-3">
                    <input type="checkbox" id="consentCheck" class="w-4 h-4 mt-0.5">
                    <label id="consentLabel" class="text-sm font-normal text-gray-600" style="margin-bottom: 0;">
                        I confirm that the lead has provided consent for transfer and all information is accurate to the best of my knowledge.
                    </label>
                </div>
                <div>
                    <label><i class="fas fa-user-tie mr-2 text-gray-400 text-xs"></i> Agent Name *</label>
                    <select id="agentSelect">
                        <option value="">Loading agents...</option>
                    </select>
                </div>
                <button id="submitBtn" class="primary-btn">
                    Submit Vetting Request
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // ==================== CONFIGURATION ====================
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzdh1DLqbyhHAZNjV5O_0VwW5njnZgQ7P6jczsqSVjjXrHmkjLC3bqsFKS5fmwsA58/exec";
        
        // US States
        const STATES = ['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY'];
        
        // State
        let currentCampaign = 'Auto';
        let isSubmitting = false;
        
        // DOM Elements
        const step1Container = document.getElementById('step1Container');
        const step2Container = document.getElementById('step2Container');
        const continueBtn = document.getElementById('continueBtn');
        const autoCampaignBtn = document.getElementById('autoCampaignBtn');
        const mvaCampaignBtn = document.getElementById('mvaCampaignBtn');
        const autoForm = document.getElementById('autoForm');
        const mvaForm = document.getElementById('mvaForm');
        const submitBtn = document.getElementById('submitBtn');
        const consentLabel = document.getElementById('consentLabel');
        const agentSelect = document.getElementById('agentSelect');
        
        // Populate year dropdown
        const yearSelect = document.getElementById('autoYear');
        const currentYear = new Date().getFullYear();
        for (let year = currentYear; year >= currentYear - 40; year--) {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year;
            yearSelect.appendChild(option);
        }
        
        // Populate state dropdowns
        function populateStates() {
            const stateSelect = document.getElementById('state');
            const accidentStateSelect = document.getElementById('accidentState');
            
            STATES.forEach(state => {
                const opt1 = document.createElement('option');
                opt1.value = state;
                opt1.textContent = state;
                stateSelect.appendChild(opt1);
                
                const opt2 = document.createElement('option');
                opt2.value = state;
                opt2.textContent = state;
                accidentStateSelect.appendChild(opt2);
            });
        }
        
        // Validate Step 1
        function validateStep1() {
            const phone = document.getElementById('phone').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const state = document.getElementById('state').value;
            const zip = document.getElementById('zip').value.trim();
            const tfUrl = document.getElementById('trustedFormUrl').value.trim();
            
            if (!phone) return 'Phone number is required';
            if (!firstName) return 'First name is required';
            if (!lastName) return 'Last name is required';
            if (!state) return 'State is required';
            if (!/^\d{5}$/.test(zip)) return 'ZIP code must be 5 digits';
            if (!tfUrl) return 'TrustedForm URL is required';
            if (!tfUrl.includes('cert.trustedform.com')) return 'TrustedForm URL must contain "cert.trustedform.com"';
            
            return null;
        }
        
        // Load Agents
        async function loadAgents() {
            try {
                const response = await fetch(`${WEB_APP_URL}?action=agents`);
                const data = await response.json();
                
                if (data.success && data.agents && data.agents.length) {
                    agentSelect.innerHTML = '<option value="">Select Agent</option>';
                    data.agents.forEach(agent => {
                        const option = document.createElement('option');
                        option.value = agent;
                        option.textContent = agent;
                        agentSelect.appendChild(option);
                    });
                } else {
                    const fallbackAgents = ['Alice Johnson', 'Bob Smith', 'Carol Davis', 'David Wilson', 'Emma Brown'];
                    agentSelect.innerHTML = '<option value="">Select Agent</option>';
                    fallbackAgents.forEach(agent => {
                        const option = document.createElement('option');
                        option.value = agent;
                        option.textContent = agent;
                        agentSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading agents:', error);
                const fallbackAgents = ['Alice Johnson', 'Bob Smith', 'Carol Davis', 'David Wilson', 'Emma Brown'];
                agentSelect.innerHTML = '<option value="">Select Agent</option>';
                fallbackAgents.forEach(agent => {
                    const option = document.createElement('option');
                    option.value = agent;
                    option.textContent = agent;
                    agentSelect.appendChild(option);
                });
            }
        }
        
        // Show Toast
        function showToast(message, isSuccess) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${isSuccess ? 'toast-success' : 'toast-error'}`;
            toast.innerHTML = `<i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        
        // Switch Campaign
        function switchToAuto() {
            currentCampaign = 'Auto';
            autoForm.classList.remove('hidden');
            mvaForm.classList.add('hidden');
            autoCampaignBtn.classList.add('campaign-active');
            mvaCampaignBtn.classList.remove('campaign-active');
            consentLabel.innerHTML = 'I confirm that the lead has provided consent for Auto insurance transfer and all information is accurate.';
        }
        
        function switchToMva() {
            currentCampaign = 'MVA';
            mvaForm.classList.remove('hidden');
            autoForm.classList.add('hidden');
            mvaCampaignBtn.classList.add('campaign-active');
            autoCampaignBtn.classList.remove('campaign-active');
            consentLabel.innerHTML = 'I confirm that the lead has provided consent for MVA claim transfer and all accident details are accurate.';
        }
        
        // Validate Auto Form
        function validateAutoForm() {
            const make = document.getElementById('autoMake').value;
            const model = document.getElementById('autoModel').value.trim();
            const year = document.getElementById('autoYear').value;
            const provider = document.getElementById('autoProvider').value;
            const license = document.getElementById('autoLicense').value;
            const violations = document.getElementById('autoViolations').value;
            return make && model && year && provider && license && violations;
        }
        
        // Validate MVA Form
        function validateMvaForm() {
            const accidentDate = document.getElementById('accidentDate').value;
            const accidentState = document.getElementById('accidentState').value;
            const scenario = document.getElementById('scenario').value.trim();
            const policeReport = document.getElementById('policeReport').value;
            const faultDeclared = document.getElementById('faultDeclared').value;
            const atFaultParty = document.getElementById('atFaultParty').value;
            const impactLife = document.getElementById('impactLife').value;
            return accidentDate && accidentState && scenario && policeReport && faultDeclared && atFaultParty && impactLife;
        }
        
        // Gather Data
        function gatherAutoData() {
            return {
                make: document.getElementById('autoMake').value,
                model: document.getElementById('autoModel').value.trim(),
                year: document.getElementById('autoYear').value,
                provider: document.getElementById('autoProvider').value,
                licenseStatus: document.getElementById('autoLicense').value,
                violations: document.getElementById('autoViolations').value
            };
        }
        
        function gatherMvaData() {
            return {
                accidentDate: document.getElementById('accidentDate').value,
                accidentState: document.getElementById('accidentState').value,
                scenario: document.getElementById('scenario').value.trim(),
                policeReport: document.getElementById('policeReport').value,
                faultDeclared: document.getElementById('faultDeclared').value,
                atFaultParty: document.getElementById('atFaultParty').value,
                injuryNotes: document.getElementById('injuryNotes').value,
                treatmentNotes: document.getElementById('treatmentNotes').value,
                impactLife: document.getElementById('impactLife').value,
                attorneyStatus: document.getElementById('attorneyStatus').value,
                settlementStatus: document.getElementById('settlementStatus').value,
                releaseSigned: document.getElementById('releaseSigned').value
            };
        }
        
        // Submit
        async function submitForm() {
            if (isSubmitting) return;
            
            // Get lead data from step 1
            const leadData = {
                phone: document.getElementById('phone').value.trim(),
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                state: document.getElementById('state').value,
                zip: document.getElementById('zip').value.trim(),
                trustedFormUrl: document.getElementById('trustedFormUrl').value.trim()
            };
            
            // Validate campaign-specific fields
            if (currentCampaign === 'Auto' && !validateAutoForm()) {
                showToast('Please complete all vehicle and insurance fields', false);
                return;
            }
            
            if (currentCampaign === 'MVA' && !validateMvaForm()) {
                showToast('Please complete all accident and fault determination fields', false);
                return;
            }
            
            const consent = document.getElementById('consentCheck').checked;
            if (!consent) {
                showToast('Please confirm consent to proceed', false);
                return;
            }
            
            const agentName = document.getElementById('agentSelect').value;
            if (!agentName) {
                showToast('Please select an agent name', false);
                return;
            }
            
            isSubmitting = true;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span> Submitting...';
            
            const payload = {
                campaign: currentCampaign,
                ...leadData,
                agentName: agentName,
                qualification: currentCampaign === 'Auto' ? gatherAutoData() : gatherMvaData()
            };
            
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast(`✓ Vetting request submitted! ID: ${result.submissionId || 'success'}`, true);
                    
                    // Reset all fields
                    document.getElementById('phone').value = '';
                    document.getElementById('firstName').value = '';
                    document.getElementById('lastName').value = '';
                    document.getElementById('state').value = '';
                    document.getElementById('zip').value = '';
                    document.getElementById('trustedFormUrl').value = '';
                    document.getElementById('consentCheck').checked = false;
                    
                    document.getElementById('autoMake').value = '';
                    document.getElementById('autoModel').value = '';
                    document.getElementById('autoYear').value = '';
                    document.getElementById('autoProvider').value = '';
                    document.getElementById('autoLicense').value = 'Valid';
                    document.getElementById('autoViolations').value = 'Clean';
                    
                    document.getElementById('accidentDate').value = '';
                    document.getElementById('accidentState').value = '';
                    document.getElementById('scenario').value = '';
                    document.getElementById('policeReport').value = 'Yes, and I have the report';
                    document.getElementById('faultDeclared').value = 'Yes, Police declared other at fault';
                    document.getElementById('atFaultParty').value = 'The other driver was completely at fault';
                    document.getElementById('injuryNotes').value = '';
                    document.getElementById('treatmentNotes').value = '';
                    document.getElementById('impactLife').value = 'Yes, unable to work';
                    document.getElementById('attorneyStatus').value = 'No, I do not have an attorney';
                    document.getElementById('settlementStatus').value = 'No, I haven\'t received any payment';
                    document.getElementById('releaseSigned').value = 'No';
                    
                    // Go back to step 1
                    step1Container.classList.remove('hidden');
                    step2Container.classList.add('hidden');
                } else {
                    showToast(`✗ Submission failed: ${result.message}`, false);
                }
            } catch (error) {
                console.error('Submission error:', error);
                showToast('Network error. Please check your connection and try again.', false);
            } finally {
                isSubmitting = false;
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Submit Vetting Request';
            }
        }
        
        // Event Listeners
        continueBtn.addEventListener('click', () => {
            const error = validateStep1();
            if (error) {
                showToast(error, false);
                return;
            }
            
            // Hide step 1, show step 2
            step1Container.classList.add('hidden');
            step2Container.classList.remove('hidden');
        });
        
        autoCampaignBtn.addEventListener('click', switchToAuto);
        mvaCampaignBtn.addEventListener('click', switchToMva);
        submitBtn.addEventListener('click', submitForm);
        
        // Input formatting
        document.getElementById('phone').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
        });
        
        document.getElementById('zip').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 5);
        });
        
        // Initialize
        populateStates();
        loadAgents();
        switchToAuto(); // Set default campaign
    </script>
</body>
</html>
